name: Build my angular app

on:
  push:
    branches: [main]

jobs:
  build-angular-jobs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: setup node js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: install dependencies
        run: npm install
      - name: build angular app
        run: npm run build


        
